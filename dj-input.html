<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DJ Input — Subversive Radio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 16px;
      padding-bottom: 40px;
      -webkit-user-select: none;
      user-select: none;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .logo { font-size: 10px; letter-spacing: 4px; color: #555; text-transform: uppercase; }
    .title { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: #00ccff; margin-top: 4px; }

    .status-bar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 16px; background: #111; border: 1px solid #222; border-radius: 10px; margin-bottom: 16px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff3333; flex-shrink: 0; }
    .dot.ok { background: #00ff88; }
    .status-text { font-size: 12px; font-weight: 600; letter-spacing: 1px; }
    .status-text.waiting { color: #ffaa00; }
    .status-text.live { color: #00ff88; }
    .status-text.off { color: #555; }
    .status-text.err { color: #ff3333; }

    .section-label {
      font-size: 9px; letter-spacing: 2px; color: #555; text-transform: uppercase;
      margin-bottom: 8px; margin-top: 16px;
    }

    .load-btn {
      width: 100%; padding: 14px; border-radius: 10px; border: 2px dashed #333;
      background: #111; color: #888; font-family: inherit; font-size: 14px;
      letter-spacing: 1px; cursor: pointer; text-align: center; margin-bottom: 8px; transition: all 0.2s;
    }
    .load-btn:active { border-color: #00ccff; color: #00ccff; }

    .url-section {
      background: #111; border: 1px solid #222; border-radius: 10px;
      padding: 12px; margin-bottom: 12px;
    }
    .url-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .url-input {
      flex: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 8px;
      padding: 10px 12px; color: #e0e0e0; font-family: inherit; font-size: 13px; outline: none;
    }
    .url-input:focus { border-color: #00ccff; }
    .url-input::placeholder { color: #444; }
    .url-play-btn {
      padding: 10px 16px; border-radius: 8px; border: 1px solid #00ccff;
      background: rgba(0,204,255,0.1); color: #00ccff; font-family: inherit;
      font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
    }
    .url-play-btn:active { background: #00ccff; color: #000; }
    .url-hint { font-size: 9px; color: #444; line-height: 1.5; }

    .playlist {
      max-height: 35vh; overflow-y: auto; margin-bottom: 12px;
      border: 1px solid #222; border-radius: 10px; background: #111;
    }
    .track {
      padding: 10px 14px; border-bottom: 1px solid #1a1a1a; font-size: 13px;
      cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s;
    }
    .track:last-child { border-bottom: none; }
    .track:active { background: #1a1a1a; }
    .track.playing { color: #00ccff; background: rgba(0,204,255,0.05); }
    .track-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .track-dur { font-size: 10px; color: #555; }
    .track-icon { font-size: 10px; width: 14px; text-align: center; }
    .track-remove {
      font-size: 14px; color: #444; cursor: pointer; padding: 2px 6px;
      border: none; background: none; -webkit-tap-highlight-color: transparent;
    }
    .track-remove:active { color: #ff3333; }

    .now-playing {
      background: #111; border: 1px solid #222; border-radius: 10px;
      padding: 12px; margin-bottom: 12px;
    }
    .np-title {
      font-size: 13px; font-weight: 600; margin-bottom: 8px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .np-time { font-size: 10px; color: #666; margin-bottom: 6px; }
    .progress-bar {
      width: 100%; height: 6px; background: #222; border-radius: 3px;
      overflow: hidden; margin-bottom: 10px; cursor: pointer;
    }
    .progress-fill { height: 100%; background: #00ccff; width: 0%; border-radius: 3px; transition: width 0.2s linear; }

    .controls { display: flex; align-items: center; justify-content: center; gap: 16px; }
    .ctrl-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 1px solid #333;
      background: #1a1a1a; color: #ccc; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn.play {
      width: 56px; height: 56px; border-color: #00ccff; color: #00ccff; font-size: 22px;
    }
    .ctrl-btn:active { background: #222; }

    .vol-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .vol-row label { font-size: 9px; letter-spacing: 1px; color: #555; width: 30px; }
    .vol-row input[type=range] { flex: 1; accent-color: #00ccff; }
    .vol-row .val { font-size: 10px; color: #666; width: 35px; text-align: right; }

    .info { margin-top: 16px; font-size: 10px; color: #444; text-align: center; line-height: 1.6; }
    input[type=file] { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Subversive Radio</div>
    <div class="title">DJ INPUT</div>
  </div>

  <div class="status-bar">
    <div class="dot" id="connDot"></div>
    <span class="status-text off" id="statusText">Connecting...</span>
  </div>

  <!-- URL INPUT -->
  <div class="section-label">PLAY FROM LINK</div>
  <div class="url-section">
    <div class="url-row">
      <input type="text" class="url-input" id="urlInput" placeholder="Paste audio URL..." autocomplete="off" autocorrect="off">
      <button class="url-play-btn" onclick="loadUrl()">PLAY</button>
    </div>
    <div class="url-hint">
      Direct audio links (.mp3, .ogg, .wav), radio streams, or any playable URL.
    </div>
  </div>

  <!-- FILE INPUT -->
  <div class="section-label">LOAD FROM DEVICE</div>
  <label class="load-btn" for="fileInput" id="loadBtn">
    📂 TAP TO LOAD MUSIC
  </label>
  <input type="file" id="fileInput" accept="audio/*" multiple>

  <!-- PLAYLIST -->
  <div class="playlist" id="playlist" style="display:none"></div>

  <!-- NOW PLAYING -->
  <div class="now-playing" id="nowPlaying" style="display:none">
    <div class="np-title" id="npTitle">—</div>
    <div class="np-time"><span id="npCurrent">0:00</span> / <span id="npDuration">0:00</span></div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
    </div>
    <div class="vol-row">
      <label>VOL</label>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1" oninput="updateVol()">
      <span class="val" id="volVal">100%</span>
    </div>
  </div>

  <div class="info" id="infoText">
    Load music from your device or paste a link.<br>
    Audio streams into the broadcast when the host enables input.
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io(window.location.origin, {
      transports: ['polling', 'websocket'],
      upgrade: true,
      reconnection: true,
      reconnectionDelay: 500,
      reconnectionDelayMax: 3000,
      reconnectionAttempts: Infinity
    });
    let audioContext, sourceNode, processorNode, gainNode;
    let tracks = [];
    let currentIndex = -1;
    let audioEl = null;
    let allowed = false;
    let connected = false;

    // Socket events
    socket.on('connect', () => {
      connected = true;
      document.getElementById('connDot').classList.add('ok');
      socket.emit('join-dj-input', { name: 'iPad DJ' });
      updateStatus();
    });

    socket.on('disconnect', () => {
      connected = false;
      document.getElementById('connDot').classList.remove('ok');
      allowed = false;
      updateStatus();
    });

    socket.on('reconnect', () => {
      socket.emit('join-dj-input', { name: 'iPad DJ' });
    });

    socket.on('dj-input-kicked', () => {
      allowed = false;
      connected = false;
      stopAudio();
      socket.disconnect();
      document.getElementById('statusText').textContent = 'Host closed DJ input';
      document.getElementById('statusText').className = 'status-text err';
      document.getElementById('connDot').classList.remove('ok');
    });

    socket.on('dj-input-state', (on) => {
      allowed = on;
      updateStatus();
    });

    function updateStatus() {
      const el = document.getElementById('statusText');
      el.className = 'status-text';
      if (!connected) {
        el.textContent = 'Disconnected';
        el.classList.add('off');
      } else if (allowed) {
        el.textContent = 'ENABLED — audio streaming to broadcast';
        el.classList.add('live');
      } else {
        el.textContent = 'Connected — waiting for host to enable';
        el.classList.add('waiting');
      }
    }

    // ========== URL LOADING ==========
    function loadUrl() {
      let url = document.getElementById('urlInput').value.trim();
      if (!url) return;

      // Add to playlist
      let name = 'Stream';
      try {
        const parsed = new URL(url);
        name = decodeURIComponent(parsed.pathname.split('/').pop() || parsed.hostname);
        if (name.length > 40) name = name.slice(0, 40) + '...';
      } catch(e) {}

      tracks.push({ name, url, isUrl: true });
      renderPlaylist();
      document.getElementById('playlist').style.display = 'block';
      document.getElementById('nowPlaying').style.display = 'block';
      loadTrack(tracks.length - 1);
      playTrack();
      document.getElementById('urlInput').value = '';
    }

    // Enter key in URL input
    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); loadUrl(); }
    });

    // ========== FILE LOADING ==========
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;

      files.forEach(f => {
        tracks.push({ name: f.name.replace(/\.[^.]+$/, ''), url: URL.createObjectURL(f), file: f });
      });
      renderPlaylist();
      document.getElementById('playlist').style.display = 'block';
      document.getElementById('nowPlaying').style.display = 'block';
      if (currentIndex < 0) loadTrack(0);
    });

    // ========== PLAYLIST ==========
    function renderPlaylist() {
      const el = document.getElementById('playlist');
      el.innerHTML = tracks.map((t, i) =>
        `<div class="track ${i === currentIndex ? 'playing' : ''}" onclick="loadTrack(${i}); playTrack();">
          <span class="track-icon">${i === currentIndex ? '▶' : (t.isUrl ? '🔗' : '🎵')}</span>
          <span class="track-name">${escHtml(t.name)}</span>
          <button class="track-remove" onclick="event.stopPropagation(); removeTrack(${i})">✕</button>
        </div>`
      ).join('');
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function removeTrack(i) {
      if (i === currentIndex) {
        stopAudio();
        currentIndex = -1;
        document.getElementById('npTitle').textContent = '—';
        document.getElementById('playBtn').textContent = '▶';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('npCurrent').textContent = '0:00';
        document.getElementById('npDuration').textContent = '0:00';
      } else if (i < currentIndex) {
        currentIndex--;
      }
      tracks.splice(i, 1);
      if (tracks.length === 0) {
        document.getElementById('playlist').style.display = 'none';
        document.getElementById('nowPlaying').style.display = 'none';
      }
      renderPlaylist();
    }

    // ========== PLAYER ==========
    function loadTrack(i) {
      if (i < 0 || i >= tracks.length) return;
      currentIndex = i;

      if (audioEl) {
        audioEl.pause();
        audioEl.src = '';
      }

      audioEl = new Audio();
      audioEl.crossOrigin = 'anonymous';
      audioEl.src = tracks[i].url;
      audioEl.setAttribute('playsinline', '');
      audioEl.setAttribute('webkit-playsinline', '');
      audioEl.volume = parseFloat(document.getElementById('volume').value);

      audioEl.onended = () => nextTrack();
      audioEl.ontimeupdate = updateProgress;
      audioEl.onloadedmetadata = () => {
        document.getElementById('npDuration').textContent = fmtTime(audioEl.duration);
      };
      audioEl.onerror = () => {
        document.getElementById('npTitle').textContent = '⚠ Cannot play — try a direct audio link';
      };

      document.getElementById('npTitle').textContent = tracks[i].name;
      document.getElementById('playBtn').textContent = '▶';
      renderPlaylist();

      setupCapture();
    }

    function setupCapture() {
      if (!audioEl) return;

      if (audioContext) { try { audioContext.close(); } catch(e) {} }

      audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 22050 });
      audioContext.resume();

      try {
        sourceNode = audioContext.createMediaElementSource(audioEl);
      } catch(e) {
        // Already connected to another context — just play without capture
        return;
      }
      gainNode = audioContext.createGain();
      gainNode.gain.value = 1.0;

      const bufferSize = 4096;
      processorNode = audioContext.createScriptProcessor(bufferSize, 1, 1);

      sourceNode.connect(gainNode);
      gainNode.connect(processorNode);
      gainNode.connect(audioContext.destination);

      const silentDest = audioContext.createMediaStreamDestination();
      processorNode.connect(silentDest);

      processorNode.onaudioprocess = (e) => {
        if (!allowed || !audioEl || audioEl.paused) return;
        const inputData = e.inputBuffer.getChannelData(0);
        const pcmData = new Int16Array(inputData.length);
        for (let i = 0; i < inputData.length; i++) {
          const s = Math.max(-1, Math.min(1, inputData[i]));
          pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        socket.emit('audio-stream', pcmData.buffer);
      };
    }

    function playTrack() {
      if (!audioEl) return;
      if (audioContext && audioContext.state === 'suspended') audioContext.resume();
      audioEl.play().catch(() => {});
      document.getElementById('playBtn').textContent = '⏸';
    }

    function togglePlay() {
      if (!audioEl) return;
      if (audioEl.paused) {
        playTrack();
      } else {
        audioEl.pause();
        document.getElementById('playBtn').textContent = '▶';
      }
    }

    function nextTrack() {
      if (tracks.length === 0) return;
      const next = (currentIndex + 1) % tracks.length;
      loadTrack(next);
      playTrack();
    }

    function prevTrack() {
      if (tracks.length === 0) return;
      if (audioEl && audioEl.currentTime > 3) {
        audioEl.currentTime = 0;
        return;
      }
      const prev = (currentIndex - 1 + tracks.length) % tracks.length;
      loadTrack(prev);
      playTrack();
    }

    function stopAudio() {
      if (audioEl) { audioEl.pause(); audioEl.src = ''; audioEl = null; }
      if (audioContext) { try { audioContext.close(); } catch(e) {} audioContext = null; }
    }

    function updateProgress() {
      if (!audioEl || !audioEl.duration || !isFinite(audioEl.duration)) return;
      const pct = (audioEl.currentTime / audioEl.duration) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('npCurrent').textContent = fmtTime(audioEl.currentTime);
    }

    document.getElementById('progressBar').addEventListener('click', (e) => {
      if (!audioEl || !audioEl.duration) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audioEl.currentTime = pct * audioEl.duration;
    });

    function updateVol() {
      const v = parseFloat(document.getElementById('volume').value);
      document.getElementById('volVal').textContent = Math.round(v * 100) + '%';
      if (audioEl) audioEl.volume = v;
    }

    function fmtTime(s) {
      if (!s || !isFinite(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    // Keep alive
    let wakeLock = null;
    async function requestWakeLock() {
      try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
    requestWakeLock();

    setInterval(() => {
      if (audioContext && audioContext.state === 'suspended') audioContext.resume();
    }, 3000);

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        requestWakeLock();
        if (audioContext && audioContext.state === 'suspended') audioContext.resume();
      }
    });
  </script>
</body>
</html>
